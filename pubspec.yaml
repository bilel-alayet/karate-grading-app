name: karate_pro
description: Application de gestion des inscriptions karaté avec Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  
  # HTTP pour EmailJS
  http: ^1.1.0
  
  # Stockage local pour mode hors ligne
  shared_preferences: ^2.2.2
  
  # Crypto pour hash sécurisé
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
